version: '3.8'

services:
  mongo-express:
    image: mongo-express:1.0.2
    environment:
      - ME_CONFIG_MONGODB_URL=${MONGODB_URI}
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=ferreprecios2025
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_SSL=true
      - ME_CONFIG_MONGODB_SSLVALIDATE=false
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    networks:
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"

        # HTTP
        - "traefik.http.routers.mongo-express.rule=Host(`mongoferreprecios.byronrm.com`)"
        - "traefik.http.routers.mongo-express.entrypoints=http"
        - "traefik.http.routers.mongo-express.middlewares=mongo-https-redirect"

        # Redirección a HTTPS
        - "traefik.http.middlewares.mongo-https-redirect.redirectscheme.scheme=https"

        # HTTPS
        - "traefik.http.routers.mongo-express-secure.rule=Host(`mongoferreprecios.byronrm.com`)"
        - "traefik.http.routers.mongo-express-secure.entrypoints=https"
        - "traefik.http.routers.mongo-express-secure.tls=true"
        - "traefik.http.routers.mongo-express-secure.tls.certresolver=http"
        - "traefik.http.routers.mongo-express-secure.service=mongo-express"

        # Puerto interno de Mongo Express
        - "traefik.http.services.mongo-express.loadbalancer.server.port=8081"

        # Red de Traefik
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true
