name: Deploy al VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if [ ! -d ~/ferreprecios-backend ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/LarissaGuaman1/ferreprecios-backend.git ~/ferreprecios-backend
            fi
            cd ~/ferreprecios-backend
            git pull https://${{ secrets.GH_TOKEN }}@github.com/LarissaGuaman1/ferreprecios-backend.git main
            docker compose down
            docker stop $(docker ps -q) 2>/dev/null || true
            docker compose up -d --build
